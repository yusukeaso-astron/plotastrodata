name: Python Package using Conda

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1

    steps:
    - uses: actions/checkout@v5
    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: Add conda to system path
      run: |
        # $CONDA is an environment variable pointing to the root of the miniconda directory
        echo $CONDA/bin >> $GITHUB_PATH
    - name: Install dependencies
      run: |
        conda env update --file environment.yml --name base
    - name: Lint with flake8
      run: |
        conda install flake8 --solver=classic
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Test basic Matplotlib rendering
      run: |
        python - <<'PY'
        import matplotlib
        matplotlib.use("Agg")
    
        import matplotlib.pyplot as plt
        from matplotlib import ft2font, font_manager
    
        print("Matplotlib:", matplotlib.__version__)
        print("FreeType:", ft2font.__freetype_version__)
        print("Matplotlib config:", matplotlib.matplotlib_fname())
        print("Matplotlib cache:", matplotlib.get_cachedir())
        print("DejaVu Sans:", font_manager.findfont("DejaVu Sans"))
    
        fig, ax = plt.subplots()
        ax.plot([0, 1], [0, 1])
        ax.set_xlabel("x")
        ax.set_ylabel("y")
        ax.set_title("Matplotlib smoke test")
        fig.savefig("matplotlib-smoke-test.png", dpi=100)
        plt.close(fig)
    
        print("Basic Matplotlib figure saved successfully.")
        PY
    
    
    
    
    
    
    
    
    
    
    - name: Test with pytest
      run: |
        conda install pytest --solver=classic
        pytest
